# Linear GraphQL Mutations — AppStride Team
# Usage: Preview mutation payload to user BEFORE executing. Wait for confirmation.
# Auth: Authorization: $LINEAR_API_KEY
# Endpoint: POST https://api.linear.app/graphql

# ─── ISSUE CREATE ─────────────────────────────────────────────────────────────

# Variables: $teamId (required), $title (required)
# Optional: $description, $priority, $stateId, $assigneeId, $labelIds, $projectId, $cycleId, $estimate, $dueDate, $parentId
mutation IssueCreate($teamId: String!, $title: String!, $description: String, $priority: Int, $stateId: String, $assigneeId: String, $labelIds: [String!], $projectId: String, $cycleId: String, $estimate: Int, $dueDate: TimelessDate, $parentId: String) {
  issueCreate(
    input: {
      teamId: $teamId
      title: $title
      description: $description
      priority: $priority
      stateId: $stateId
      assigneeId: $assigneeId
      labelIds: $labelIds
      projectId: $projectId
      cycleId: $cycleId
      estimate: $estimate
      dueDate: $dueDate
      parentId: $parentId
    }
  ) {
    success
    issue {
      id
      identifier
      title
      url
      state {
        name
      }
      assignee {
        name
      }
      priority
      priorityLabel
    }
  }
}

# ─── ISSUE UPDATE ─────────────────────────────────────────────────────────────

# Variables: $issueId (required — UUID or identifier like "APP-123")
# Pass only the fields you want to change
mutation IssueUpdate($issueId: String!, $title: String, $description: String, $priority: Int, $stateId: String, $assigneeId: String, $labelIds: [String!], $projectId: String, $cycleId: String, $estimate: Int, $dueDate: TimelessDate) {
  issueUpdate(
    id: $issueId
    input: {
      title: $title
      description: $description
      priority: $priority
      stateId: $stateId
      assigneeId: $assigneeId
      labelIds: $labelIds
      projectId: $projectId
      cycleId: $cycleId
      estimate: $estimate
      dueDate: $dueDate
    }
  ) {
    success
    issue {
      id
      identifier
      title
      url
      state {
        name
      }
      assignee {
        name
      }
      priority
      priorityLabel
    }
  }
}

# ─── ISSUE DELETE (Archive) ───────────────────────────────────────────────────

# Note: This trashes the issue. Use issueUpdate with stateId to cancel instead.
mutation IssueDelete($issueId: String!) {
  issueDelete(id: $issueId) {
    success
  }
}

# ─── ISSUE ARCHIVE ───────────────────────────────────────────────────────────

mutation IssueArchive($issueId: String!) {
  issueArchive(id: $issueId) {
    success
  }
}

# ─── COMMENT CREATE ───────────────────────────────────────────────────────────

# Variables: $issueId (required), $body (required — supports Markdown)
mutation CommentCreate($issueId: String!, $body: String!) {
  commentCreate(
    input: {
      issueId: $issueId
      body: $body
    }
  ) {
    success
    comment {
      id
      body
      createdAt
      url
      user {
        name
      }
    }
  }
}

# ─── COMMENT UPDATE ───────────────────────────────────────────────────────────

mutation CommentUpdate($commentId: String!, $body: String!) {
  commentUpdate(
    id: $commentId
    input: {
      body: $body
    }
  ) {
    success
    comment {
      id
      body
      updatedAt
    }
  }
}

# ─── COMMENT DELETE ───────────────────────────────────────────────────────────

mutation CommentDelete($commentId: String!) {
  commentDelete(id: $commentId) {
    success
  }
}

# ─── LABEL CREATE ─────────────────────────────────────────────────────────────

# Variables: $teamId (required), $name (required), $color (optional — hex like "#ff0000")
mutation LabelCreate($teamId: String!, $name: String!, $color: String, $description: String) {
  issueLabelCreate(
    input: {
      teamId: $teamId
      name: $name
      color: $color
      description: $description
    }
  ) {
    success
    issueLabel {
      id
      name
      color
    }
  }
}

# ─── LABEL UPDATE ─────────────────────────────────────────────────────────────

mutation LabelUpdate($labelId: String!, $name: String, $color: String, $description: String) {
  issueLabelUpdate(
    id: $labelId
    input: {
      name: $name
      color: $color
      description: $description
    }
  ) {
    success
    issueLabel {
      id
      name
      color
    }
  }
}

# ─── CYCLE CREATE ─────────────────────────────────────────────────────────────

# Variables: $teamId (required), $startsAt (required — ISO date), $endsAt (required — ISO date)
# Optional: $name, $description
mutation CycleCreate($teamId: String!, $startsAt: DateTime!, $endsAt: DateTime!, $name: String, $description: String) {
  cycleCreate(
    input: {
      teamId: $teamId
      startsAt: $startsAt
      endsAt: $endsAt
      name: $name
      description: $description
    }
  ) {
    success
    cycle {
      id
      name
      number
      startsAt
      endsAt
    }
  }
}

# ─── CYCLE UPDATE ─────────────────────────────────────────────────────────────

mutation CycleUpdate($cycleId: String!, $startsAt: DateTime, $endsAt: DateTime, $name: String, $description: String) {
  cycleUpdate(
    id: $cycleId
    input: {
      startsAt: $startsAt
      endsAt: $endsAt
      name: $name
      description: $description
    }
  ) {
    success
    cycle {
      id
      name
      number
      startsAt
      endsAt
    }
  }
}

# ─── ATTACHMENT CREATE (GitHub link, external resources) ──────────────────────

# Use this to link GitHub PRs, branches, or any external URL to an issue.
# URL is idempotent: same URL + same issue = update instead of duplicate.
mutation AttachmentCreate($issueId: String!, $title: String!, $url: String!, $subtitle: String, $iconUrl: String, $metadata: JSONObject) {
  attachmentCreate(
    input: {
      issueId: $issueId
      title: $title
      url: $url
      subtitle: $subtitle
      iconUrl: $iconUrl
      metadata: $metadata
    }
  ) {
    success
    attachment {
      id
      title
      url
    }
  }
}

# ─── ATTACHMENT UPDATE ────────────────────────────────────────────────────────

mutation AttachmentUpdate($attachmentId: String!, $title: String, $subtitle: String, $metadata: JSONObject) {
  attachmentUpdate(
    id: $attachmentId
    input: {
      title: $title
      subtitle: $subtitle
      metadata: $metadata
    }
  ) {
    success
    attachment {
      id
      title
    }
  }
}

# ─── ATTACHMENT DELETE ────────────────────────────────────────────────────────

mutation AttachmentDelete($attachmentId: String!) {
  attachmentDelete(id: $attachmentId) {
    success
  }
}

# ─── SUB-ISSUE CREATE ─────────────────────────────────────────────────────────

# Same as IssueCreate but with parentId set
mutation SubIssueCreate($teamId: String!, $parentId: String!, $title: String!, $description: String, $priority: Int, $stateId: String, $assigneeId: String) {
  issueCreate(
    input: {
      teamId: $teamId
      parentId: $parentId
      title: $title
      description: $description
      priority: $priority
      stateId: $stateId
      assigneeId: $assigneeId
    }
  ) {
    success
    issue {
      id
      identifier
      title
      url
      parent {
        identifier
        title
      }
    }
  }
}

# ─── ISSUE RELATION CREATE ────────────────────────────────────────────────────

# Types: blocks, duplicate, related
mutation IssueRelationCreate($issueId: String!, $relatedIssueId: String!, $type: IssueRelationType!) {
  issueRelationCreate(
    input: {
      issueId: $issueId
      relatedIssueId: $relatedIssueId
      type: $type
    }
  ) {
    success
    issueRelation {
      id
      type
      issue {
        identifier
      }
      relatedIssue {
        identifier
      }
    }
  }
}

# ─── PROJECT CREATE ───────────────────────────────────────────────────────────

mutation ProjectCreate($name: String!, $teamIds: [String!]!, $description: String, $leadId: String, $startDate: TimelessDate, $targetDate: TimelessDate) {
  projectCreate(
    input: {
      name: $name
      teamIds: $teamIds
      description: $description
      leadId: $leadId
      startDate: $startDate
      targetDate: $targetDate
    }
  ) {
    success
    project {
      id
      name
      state
      url
    }
  }
}

# ─── PROJECT UPDATE ───────────────────────────────────────────────────────────

mutation ProjectUpdate($projectId: String!, $name: String, $description: String, $state: String, $leadId: String, $startDate: TimelessDate, $targetDate: TimelessDate) {
  projectUpdate(
    id: $projectId
    input: {
      name: $name
      description: $description
      state: $state
      leadId: $leadId
      startDate: $startDate
      targetDate: $targetDate
    }
  ) {
    success
    project {
      id
      name
      state
      url
    }
  }
}

# ─── NOTIFICATION MARK AS READ ────────────────────────────────────────────────

mutation NotificationMarkAsRead($notificationId: String!) {
  notificationUpdate(
    id: $notificationId
    input: {
      readAt: "now"
    }
  ) {
    success
  }
}

