# ─── LABELS ──────────────────────────────────────────────────────────────────

query TeamLabels($teamId: String!) {
  team(id: $teamId) {
    labels {
      nodes {
        id
        name
        color
        description
      }
    }
  }
}

# Workspace-level labels (shared across teams)
query WorkspaceLabels {
  issueLabels(
    filter: { team: { null: true } }
  ) {
    nodes {
      id
      name
      color
      description
    }
  }
}

# ─── WORKFLOW STATES ─────────────────────────────────────────────────────────

query TeamStates($teamId: String!) {
  team(id: $teamId) {
    states {
      nodes {
        id
        name
        type
        position
        color
      }
    }
  }
}

# ─── TEAM MEMBERS ────────────────────────────────────────────────────────────

query TeamMembers($teamId: String!) {
  team(id: $teamId) {
    members {
      nodes {
        id
        name
        email
        displayName
        avatarUrl
        active
      }
    }
  }
}

# ─── SEARCH ISSUES ───────────────────────────────────────────────────────────

# Use the issues query with filter for text search
query SearchIssues($searchTerm: String!) {
  issueSearch(query: $searchTerm, first: 20) {
    nodes {
      id
      identifier
      title
      state {
        name
      }
      assignee {
        name
      }
      priority
      priorityLabel
      labels {
        nodes {
          name
        }
      }
      url
    }
  }
}

# ─── FILTERED ISSUES (advanced) ──────────────────────────────────────────────

# Filter by state type (backlog, unstarted, started, completed, canceled)
query IssuesByState($teamId: String!, $stateType: String!) {
  team(id: $teamId) {
    issues(filter: { state: { type: { eq: $stateType } } }) {
      nodes {
        id
        identifier
        title
        priority
        priorityLabel
        assignee {
          name
        }
        createdAt
      }
    }
  }
}

# Filter by priority (1=Urgent, 2=High, 3=Medium, 4=Low)
query HighPriorityIssues($teamId: String!) {
  team(id: $teamId) {
    issues(filter: { priority: { lte: 2, neq: 0 } }) {
      nodes {
        id
        identifier
        title
        priority
        priorityLabel
        state {
          name
        }
        assignee {
          name
        }
      }
    }
  }
}

# Filter by assignee
query IssuesByAssignee($assigneeEmail: String!) {
  issues(filter: { assignee: { email: { eq: $assigneeEmail } } }) {
    nodes {
      id
      identifier
      title
      state {
        name
      }
      priority
      priorityLabel
    }
  }
}

# Filter by label
query IssuesByLabel($labelName: String!) {
  issues(filter: { labels: { name: { eq: $labelName } } }) {
    nodes {
      id
      identifier
      title
      state {
        name
      }
      assignee {
        name
      }
      priority
    }
  }
}

# Issues due soon (next 2 weeks)
query IssuesDueSoon {
  issues(filter: { dueDate: { lt: "P2W" } }) {
    nodes {
      id
      identifier
      title
      dueDate
      state {
        name
      }
      assignee {
        name
      }
      priority
      priorityLabel
    }
  }
}

# ─── ISSUE COMMENTS ──────────────────────────────────────────────────────────

query IssueComments($issueId: String!) {
  issue(id: $issueId) {
    identifier
    title
    comments(orderBy: createdAt) {
      nodes {
        id
        body
        createdAt
        updatedAt
        user {
          name
          email
        }
      }
    }
  }
}

# ─── NOTIFICATIONS ───────────────────────────────────────────────────────────

query MyNotifications {
  notifications(first: 20) {
    nodes {
      id
      type
      createdAt
      readAt
      ... on IssueNotification {
        issue {
          identifier
          title
          state {
            name
          }
        }
        comment {
          body
          user {
            name
          }
        }
      }
    }
  }
}
