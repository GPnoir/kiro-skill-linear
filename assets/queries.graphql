# Linear GraphQL Queries — AppStride Team
# Usage: Select the appropriate query, substitute variables, and POST to https://api.linear.app/graphql
# Auth: Authorization: $LINEAR_API_KEY

# ─── VIEWER (current user) ────────────────────────────────────────────────────

query Viewer {
  viewer {
    id
    name
    email
    displayName
    avatarUrl
    active
  }
}

# ─── TEAMS ────────────────────────────────────────────────────────────────────

query Teams {
  teams {
    nodes {
      id
      name
      key
      description
      members {
        nodes {
          id
          name
          email
        }
      }
    }
  }
}

# ─── TEAM ISSUES (filtered) ──────────────────────────────────────────────────

# Variables: $teamId (required), $first (optional, default 50)
# Add filter object for state, assignee, priority, label filtering
query TeamIssues($teamId: String!, $first: Int = 50) {
  team(id: $teamId) {
    id
    name
    issues(first: $first, orderBy: updatedAt) {
      nodes {
        id
        identifier
        title
        priority
        priorityLabel
        state {
          id
          name
          type
        }
        assignee {
          id
          name
        }
        labels {
          nodes {
            id
            name
            color
          }
        }
        project {
          id
          name
        }
        cycle {
          id
          name
          number
        }
        estimate
        dueDate
        createdAt
        updatedAt
      }
      pageInfo {
        hasNextPage
        endCursor
      }
    }
  }
}

# ─── MY ASSIGNED ISSUES ──────────────────────────────────────────────────────

query MyIssues {
  viewer {
    assignedIssues(
      filter: { state: { type: { nin: ["completed", "canceled"] } } }
      orderBy: updatedAt
    ) {
      nodes {
        id
        identifier
        title
        priority
        priorityLabel
        state {
          id
          name
          type
        }
        labels {
          nodes {
            name
            color
          }
        }
        project {
          name
        }
        cycle {
          name
          number
        }
        dueDate
        createdAt
        updatedAt
      }
    }
  }
}

# ─── SINGLE ISSUE DETAIL ─────────────────────────────────────────────────────

# Variables: $issueId — can be UUID or identifier like "APP-123"
query IssueDetail($issueId: String!) {
  issue(id: $issueId) {
    id
    identifier
    title
    description
    priority
    priorityLabel
    estimate
    dueDate
    state {
      id
      name
      type
    }
    assignee {
      id
      name
      email
    }
    creator {
      name
    }
    labels {
      nodes {
        id
        name
        color
      }
    }
    project {
      id
      name
      state
    }
    cycle {
      id
      name
      number
      startsAt
      endsAt
    }
    parent {
      id
      identifier
      title
    }
    children {
      nodes {
        id
        identifier
        title
        state {
          name
        }
      }
    }
    comments {
      nodes {
        id
        body
        createdAt
        user {
          name
        }
      }
    }
    attachments {
      nodes {
        id
        title
        subtitle
        url
      }
    }
    relations {
      nodes {
        type
        relatedIssue {
          identifier
          title
        }
      }
    }
    createdAt
    updatedAt
    url
  }
}

# ─── CYCLES (sprints) ────────────────────────────────────────────────────────

query TeamCycles($teamId: String!) {
  team(id: $teamId) {
    cycles(orderBy: createdAt) {
      nodes {
        id
        name
        number
        startsAt
        endsAt
        completedAt
        progress
        scopeHistory
        completedScopeHistory
        issues {
          nodes {
            id
            identifier
            title
            state {
              name
              type
            }
            assignee {
              name
            }
            priority
            priorityLabel
          }
        }
      }
    }
  }
}

# ─── ACTIVE CYCLE ────────────────────────────────────────────────────────────

query ActiveCycle($teamId: String!) {
  team(id: $teamId) {
